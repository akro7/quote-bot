name: Akro Quote Bot Runner

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clone Quote API
        run: |
          git clone https://github.com/LyoSU/quote-api.git quote-api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            quote-api/package-lock.json

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install and Start Quote API
        env:
          MONGO_URL: mongodb://localhost:27017/quote-db
        run: |
          cd quote-api
          npm install --production
          node index.js &
          sleep 10

      - name: Install and Run Quote Bot
        env:
          REDIS_URL: redis://localhost:6379
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          npm install --production
          node updates-collector.js
