name: Akro Quote Bot Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يسمح لك بتشغيل البوت يدوياً

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    services:
      # تشغيل قاعدة بيانات Redis المطلوبة للمجمع
      redis:
        image: redis
        ports:
          - 6379:6379
      # تشغيل MongoDB المطلوبة للـ API
      mongodb:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # نسخة مستقرة ومناسبة لـ Sharp

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install and Run Quote API
        env:
          MONGO_URL: mongodb://localhost:27017/quote-db
        run: |
          cd quote-api
          npm install
          node index.js & # تشغيل في الخلفية

      - name: Install and Run Quote Bot
        env:
          REDIS_URL: redis://localhost:6379
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # سحب التوكن من الإعدادات بأمان
        run: |
          cd quote-bot
          npm install
          node updates-collector.js
